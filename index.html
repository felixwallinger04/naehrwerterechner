  // Speicher-Shim: localStorage statt Claude-Artifact-Storage, damit der
  // Rechner eigenständig (auch offline) im Browser läuft.
  window.storage = {
    async get(key) {
      try {
        var v = localStorage.getItem("naehrwertrechner:" + key);
        return v !== null ? { key: key, value: v } : null;
      } catch (e) { return null; }
    },
    async set(key, value) {
      try {
        localStorage.setItem("naehrwertrechner:" + key, value);
        return { key: key, value: value };
      } catch (e) { return null; }
    }
  };
</script>

var MONTH_SHORT = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
var WEEKDAY_LABELS = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];

function dateKeyFromDate(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function todayKey() { return dateKeyFromDate(new Date()); }
function addDays(dateStr, n) {
  var d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return dateKeyFromDate(d);
}
function weekdayLabel(d) { return WEEKDAY_LABELS[d.getDay()]; }
function formatShortDate(dateStr) {
  var parts = dateStr.split("-");
  return parts[2] + "." + parts[1] + ".";
}
function formatLongDate(dateStr) {
  var parts = dateStr.split("-");
  var monthNames = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  return parseInt(parts[2],10) + ". " + monthNames[parseInt(parts[1],10)-1] + " " + parts[0];
}
function computeTotals(entries) {
  return entries.reduce(function (acc, e) {
    return { kcal: acc.kcal + e.kcal, protein: acc.protein + e.protein, carbs: acc.carbs + e.carbs, fat: acc.fat + e.fat };
  }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function round1(n) { return Math.round(n * 10) / 10; }
function pctOf(value, goal) {
  if (!goal || goal <= 0) return null;
  return Math.round((value / goal) * 100);
}
function avg(arr) {
  if (!arr.length) return 0;
  var s = 0;
  for (var i=0;i<arr.length;i++) s += arr[i];
  return s / arr.length;
}
function mondayOfWeek(dateStr) {
  var d = new Date(dateStr + "T00:00:00");
  var day = d.getDay();
  var diff = (day === 0 ? -6 : 1) - day;
  d.setDate(d.getDate() + diff);
  return dateKeyFromDate(d);
}
function monthLabel(mk) {
  var parts = mk.split("-");
  var y = parts[0].slice(2);
  var m = parseInt(parts[1],10)-1;
  return MONTH_SHORT[m] + " " + y;
}
function groupWeightData(entries, range) {
  if (!entries.length) return [];
  var sorted = entries.slice().sort(function(a,b){ return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });

  if (range === "day") {
    return sorted.slice(-30).map(function(e){ return { x: formatShortDate(e.date), y: e.weight }; });
  }
  if (range === "week") {
    var wBuckets = {};
    sorted.forEach(function(e){
      var wk = mondayOfWeek(e.date);
      (wBuckets[wk] = wBuckets[wk] || []).push(e.weight);
    });
    var wKeys = Object.keys(wBuckets).sort();
    return wKeys.slice(-26).map(function(k){ return { x: formatShortDate(k), y: round1(avg(wBuckets[k])) }; });
  }
  if (range === "month") {
    var mBuckets = {};
    sorted.forEach(function(e){
      var mk = e.date.slice(0,7);
      (mBuckets[mk] = mBuckets[mk] || []).push(e.weight);
    });
    var mKeys = Object.keys(mBuckets).sort();
    return mKeys.slice(-24).map(function(k){ return { x: monthLabel(k), y: round1(avg(mBuckets[k])) }; });
  }
  if (range === "year") {
    var yBuckets = {};
    sorted.forEach(function(e){
      var yk = e.date.slice(0,4);
      (yBuckets[yk] = yBuckets[yk] || []).push(e.weight);
    });
    var yKeys = Object.keys(yBuckets).sort();
    return yKeys.map(function(k){ return { x: k, y: round1(avg(yBuckets[k])) }; });
  }
  return sorted.map(function(e){ return { x: formatShortDate(e.date), y: e.weight }; });
}

async function storageGet(key, fallback) {
  try {
    var res = await window.storage.get(key);
    return res ? JSON.parse(res.value) : fallback;
  } catch (e) { return fallback; }
}
async function storageSet(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); } catch (e) {}
}

function Ring(props) {
  var value = props.value, goal = props.goal, color = props.color;
  var size = props.size || 96, stroke = props.stroke || 9;
  var pct = goal > 0 ? Math.min(value / goal, 1) : 0;
  var r = (size - stroke) / 2;
  var c = 2 * Math.PI * r;
  return h("svg", { width: size, height: size, style: { transform: "rotate(-90deg)" } },
    h("circle", { cx: size / 2, cy: size / 2, r: r, fill: "none", stroke: "#33312C", strokeWidth: stroke }),
    h("circle", {
      cx: size / 2, cy: size / 2, r: r, fill: "none", stroke: color, strokeWidth: stroke,
      strokeDasharray: c, strokeDashoffset: c * (1 - pct), strokeLinecap: "round",
      style: { transition: "stroke-dashoffset 0.5s ease" }
    })
  );
}

function LineChart(props) {
  var points = props.points || [];
  var color = props.color || "#5B8FA3";
  var height = props.height || 150;

  if (points.length === 0) {
    return h("div", { className: "chart-empty" }, "Noch keine Gewichtsdaten für diesen Zeitraum.");
  }

  var W = 300, H = height;
  var padTop = 14, padBottom = 22, padX = 10;
  var values = points.map(function(p){ return p.y; });
  var minV = Math.min.apply(null, values);
  var maxV = Math.max.apply(null, values);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  var pad = (maxV - minV) * 0.15;
  minV -= pad; maxV += pad;
  var rangeV = maxV - minV;
  var n = points.length;

  function xPos(i) { return n === 1 ? W/2 : padX + (i/(n-1)) * (W - 2*padX); }
  function yPos(v) { return padTop + (1 - (v-minV)/rangeV) * (H - padTop - padBottom); }

  var pathD = points.map(function(p,i){
    return (i===0?"M":"L") + xPos(i).toFixed(1) + "," + yPos(p.y).toFixed(1);
  }).join(" ");

  var labelStep = Math.max(1, Math.ceil(n/5));

  return h("div", { className: "chart-wrap" },
    h("svg", { viewBox: "0 0 " + W + " " + H, style: { width: "100%", height: height + "px", display: "block" } },
      h("path", { d: pathD, fill: "none", stroke: color, strokeWidth: 2, strokeLinejoin: "round", strokeLinecap: "round" }),
      points.map(function(p,i){
        return h("circle", { key: "c"+i, cx: xPos(i), cy: yPos(p.y), r: (i===n-1)?3.5:2, fill: color });
      }),
      points.map(function(p,i){
        if (i % labelStep !== 0 && i !== n-1) return null;
        var anchor = i===0 ? "start" : (i===n-1 ? "end" : "middle");
        return h("text", { key: "t"+i, x: xPos(i), y: H-6, fontSize: 8, fill: "#8A8579", textAnchor: anchor }, p.x);
      })
    )
  );
}

function NutritionTracker() {
  var loadedState = useState(false), loaded = loadedState[0], setLoaded = loadedState[1];
  var customFoodsState = useState([]), customFoods = customFoodsState[0], setCustomFoods = customFoodsState[1];
  var goalState = useState(DEFAULT_GOAL), goal = goalState[0], setGoal = goalState[1];
  var logState = useState([]), log = logState[0], setLog = logState[1];
  var searchState = useState(""), search = searchState[0], setSearch = searchState[1];
  var selectedIdState = useState(PRESET_FOODS[0].id), selectedId = selectedIdState[0], setSelectedId = selectedIdState[1];
  var gramsState = useState(100), grams = gramsState[0], setGrams = gramsState[1];
  var showAddFoodState = useState(false), showAddFood = showAddFoodState[0], setShowAddFood = showAddFoodState[1];
  var showGoalEditState = useState(false), showGoalEdit = showGoalEditState[0], setShowGoalEdit = showGoalEditState[1];
  var goalDraftState = useState(DEFAULT_GOAL), goalDraft = goalDraftState[0], setGoalDraft = goalDraftState[1];
  var newFoodState = useState({ name: "", kcal: "", protein: "", carbs: "", fat: "" }), newFood = newFoodState[0], setNewFood = newFoodState[1];
  var errorState = useState(""), error = errorState[0], setError = errorState[1];
  var todayStr = todayKey();
  var viewDateState = useState(todayStr), viewDate = viewDateState[0], setViewDate = viewDateState[1];

  var weightLogState = useState([]), weightLog = weightLogState[0], setWeightLog = weightLogState[1];
  var weightInputState = useState(""), weightInput = weightInputState[0], setWeightInput = weightInputState[1];
  var weightErrorState = useState(""), weightError = weightErrorState[0], setWeightError = weightErrorState[1];
  var weightRangeState = useState("week"), weightRange = weightRangeState[0], setWeightRange = weightRangeState[1];

  var last7Dates = useMemo(function () {
    var arr = [];
    for (var i = 6; i >= 0; i--) {
      var d = new Date();
      d.setDate(d.getDate() - i);
      arr.push(d);
    }
    return arr;
  }, []);

  var weekDataState = useState([]), weekData = weekDataState[0], setWeekData = weekDataState[1];

  useEffect(function () {
    (async function () {
      var cf = await storageGet("custom-foods", []);
      var g = await storageGet("goal", DEFAULT_GOAL);
      setCustomFoods(cf);
      setGoal(g);
      setGoalDraft(g);

      var wl = await storageGet("weight-log", []);
      wl.sort(function(a,b){ return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
      setWeightLog(wl);

      var week = [];
      for (var idx = 0; idx < last7Dates.length; idx++) {
        var d = last7Dates[idx];
        var k = dateKeyFromDate(d);
        var entries = await storageGet("log:" + k, []);
        week.push({ key: k, label: weekdayLabel(d), totals: computeTotals(entries) });
      }
      setWeekData(week);
      setLoaded(true);
    })();
  }, []);

  useEffect(function () {
    (async function () {
      var l = await storageGet("log:" + viewDate, []);
      setLog(l);
    })();
  }, [viewDate]);

  useEffect(function () {
    var existing = weightLog.find(function (w) { return w.date === viewDate; });
    setWeightInput(existing ? String(existing.weight) : "");
    setWeightError("");
  }, [viewDate, weightLog]);

  var allFoods = useMemo(function () { return PRESET_FOODS.concat(customFoods); }, [customFoods]);
  var selectedFood = allFoods.find(function (f) { return f.id === selectedId; }) || allFoods[0];

  var filteredFoods = useMemo(function () {
    if (!search.trim()) return allFoods;
    var s = search.toLowerCase();
    return allFoods.filter(function (f) { return f.name.toLowerCase().indexOf(s) !== -1; });
  }, [search, allFoods]);

  useEffect(function () {
    if (filteredFoods.length === 0) return;
    if (!filteredFoods.find(function (f) { return f.id === selectedId; })) {
      setSelectedId(filteredFoods[0].id);
    }
  }, [filteredFoods]);

  var totals = useMemo(function () { return computeTotals(log); }, [log]);

  function scale(food, g) {
    var f = g / 100;
    return { kcal: Math.round(food.kcal * f), protein: round1(food.protein * f), carbs: round1(food.carbs * f), fat: round1(food.fat * f) };
  }

  function patchWeekData(dateStr, newEntries) {
    setWeekData(function (prev) {
      return prev.map(function (d) { return d.key === dateStr ? Object.assign({}, d, { totals: computeTotals(newEntries) }) : d; });
    });
  }

  async function handleAddEntry() {
    var g = parseFloat(grams);
    if (!selectedFood || !g || g <= 0) { setError("Bitte eine gültige Menge in Gramm angeben."); return; }
    setError("");
    var vals = scale(selectedFood, g);
    var entry = Object.assign({ id: uid(), foodId: selectedFood.id, name: selectedFood.name, grams: g }, vals);
    var newLog = log.concat([entry]);
    setLog(newLog);
    await storageSet("log:" + viewDate, newLog);
    patchWeekData(viewDate, newLog);
  }

  async function handleRemoveEntry(id) {
    var newLog = log.filter(function (e) { return e.id !== id; });
    setLog(newLog);
    await storageSet("log:" + viewDate, newLog);
    patchWeekData(viewDate, newLog);
  }

  async function handleResetDay() {
    setLog([]);
    await storageSet("log:" + viewDate, []);
    patchWeekData(viewDate, []);
  }

  async function handleSaveCustomFood() {
    var name = newFood.name, kcal = newFood.kcal, protein = newFood.protein, carbs = newFood.carbs, fat = newFood.fat;
    if (!name.trim() || kcal === "" || protein === "" || carbs === "" || fat === "") {
      setError("Bitte alle Felder für das eigene Produkt ausfüllen."); return;
    }
    setError("");
    var food = {
      id: "c" + uid(), name: name.trim(),
      kcal: parseFloat(kcal) || 0, protein: parseFloat(protein) || 0, carbs: parseFloat(carbs) || 0, fat: parseFloat(fat) || 0,
      group: "Eigene Produkte"
    };
    var updated = customFoods.concat([food]);
    setCustomFoods(updated);
    await storageSet("custom-foods", updated);
    setSearch("");
    setSelectedId(food.id);
    setNewFood({ name: "", kcal: "", protein: "", carbs: "", fat: "" });
    setShowAddFood(false);
  }

  async function handleDeleteCustomFood(id) {
    var updated = customFoods.filter(function (f) { return f.id !== id; });
    setCustomFoods(updated);
    await storageSet("custom-foods", updated);
    if (selectedId === id) setSelectedId(PRESET_FOODS[0].id);
  }

  async function handleSaveGoal() {
    var cleaned = {
      kcal: parseFloat(goalDraft.kcal) || 0, protein: parseFloat(goalDraft.protein) || 0,
      carbs: parseFloat(goalDraft.carbs) || 0, fat: parseFloat(goalDraft.fat) || 0
    };
    setGoal(cleaned);
    await storageSet("goal", cleaned);
    setShowGoalEdit(false);
  }

  function goPrevDay() { setViewDate(function (v) { return addDays(v, -1); }); }
  function goNextDay() { setViewDate(function (v) { var n = addDays(v, 1); return n > todayStr ? v : n; }); }
  function onDateInputChange(e) {
    var val = e.target.value;
    if (!val) return;
    setViewDate(val > todayStr ? todayStr : val);
  }
  function jumpToDay(dateStr) { setViewDate(dateStr); }

  async function handleSaveWeight() {
    var w = parseFloat(weightInput);
    if (!w || w <= 0) { setWeightError("Bitte ein gültiges Gewicht angeben."); return; }
    setWeightError("");
    var existing = weightLog.find(function (e) { return e.date === viewDate; });
    var updated;
    if (existing) {
      updated = weightLog.map(function (e) { return e.date === viewDate ? { date: viewDate, weight: w } : e; });
    } else {
      updated = weightLog.concat([{ date: viewDate, weight: w }]);
    }
    updated.sort(function (a, b) { return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
    setWeightLog(updated);
    await storageSet("weight-log", updated);
  }

  var chartPoints = useMemo(function () { return groupWeightData(weightLog, weightRange); }, [weightLog, weightRange]);
  var latestWeight = weightLog.length ? weightLog[weightLog.length - 1] : null;
  var weightTrend = useMemo(function () {
    if (!latestWeight) return null;
    var weekAgoDate = addDays(latestWeight.date, -7);
    var comparator = null;
    for (var i = weightLog.length - 1; i >= 0; i--) {
      if (weightLog[i].date <= weekAgoDate) { comparator = weightLog[i]; break; }
    }
    if (!comparator || comparator.date === latestWeight.date) return null;
    return round1(latestWeight.weight - comparator.weight);
  }, [weightLog]);
  var rangeMin = chartPoints.length ? Math.min.apply(null, chartPoints.map(function (p) { return p.y; })) : null;
  var rangeMax = chartPoints.length ? Math.max.apply(null, chartPoints.map(function (p) { return p.y; })) : null;

  if (!loaded) {
    return h("div", { className: "page", style: { display: "flex", alignItems: "center", justifyContent: "center" } },
      h("div", { className: "mono muted" }, "LADE DATEN …"));
  }

  var remaining = {
    kcal: goal.kcal - totals.kcal, protein: goal.protein - totals.protein,
    carbs: goal.carbs - totals.carbs, fat: goal.fat - totals.fat
  };

  var macroKeys = Object.keys(MACRO_META);

  var groupedFiltered = filteredFoods.reduce(function (acc, f) {
    (acc[f.group] = acc[f.group] || []).push(f);
    return acc;
  }, {});

  var logHeaderLabel = viewDate === todayStr
    ? ("HEUTE PROTOKOLLIERT (" + log.length + ")")
    : ("PROTOKOLLIERT AM " + formatShortDate(viewDate) + " (" + log.length + ")");

  return h("div", { className: "page" },
    h("div", { className: "wrap" },
      h("div", { className: "header" },
        h("div", null,
          h("div", { className: "kicker mono" }, "NÄHRWERTRECHNER"),
          h("h1", { className: "title display" }, "Tagesbilanz")
        ),
        h("button", { className: "icon-btn", title: "Diesen Tag zurücksetzen", onClick: handleResetDay }, h(RotateCcw, { size: 15 }))
      ),

      h("div", { className: "day-nav-row" },
        h("button", { className: "day-nav-btn", onClick: goPrevDay, title: "Vorheriger Tag" }, h(ChevronLeft, { size: 16 })),
        h("input", { type: "date", className: "day-date-input", value: viewDate, max: todayStr, onChange: onDateInputChange }),
        h("button", { className: "day-nav-btn", onClick: goNextDay, disabled: viewDate >= todayStr, title: "Nächster Tag" }, h(ChevronRight, { size: 16 })),
        viewDate !== todayStr
          ? h("button", { className: "today-btn", onClick: function () { setViewDate(todayStr); } }, "Zu heute")
          : null,
        viewDate !== todayStr ? h("span", { className: "viewing-past-badge" }, formatLongDate(viewDate)) : null
      ),

      h("div", { className: "card" },
        h("div", { className: "card-row" },
          h("div", { className: "section-label mono" }, h(Target, { size: 14 }), "TAGESZIEL"),
          h("button", { className: "link-btn mono", onClick: function () { setGoalDraft(goal); setShowGoalEdit(true); } }, "bearbeiten")
        ),
        h("div", { className: "macro-grid" },
          macroKeys.map(function (k) {
            var meta = MACRO_META[k];
            var IconComp = meta.icon;
            var pct = pctOf(totals[k], goal[k]);
            return h("div", { className: "macro-item", key: k },
              h("div", { className: "ring-wrap" },
                h(Ring, { value: totals[k], goal: goal[k], color: meta.color }),
                h("div", { className: "ring-center" },
                  h(IconComp, { size: 14, style: { color: meta.color } }),
                  h("span", { className: "macro-val mono" }, Math.round(totals[k])),
                  h("span", { className: "macro-goal" }, "/ " + Math.round(goal[k]) + meta.unit)
                )
              ),
              h("span", { className: "macro-label" }, meta.label),
              h("span", { className: "macro-remaining mono", style: { color: remaining[k] >= 0 ? "#8FBC5A" : "#C97B63" } },
                (remaining[k] >= 0 ? "noch " : "über ") + Math.abs(round1(remaining[k])) + meta.unit + (pct !== null ? (" · " + pct + "%") : "")
              )
            );
          })
        )
      ),

      h("div", { className: "card" },
        h("div", { className: "card-row" },
          h("div", { className: "section-label mono" }, "PRODUKT HINZUFÜGEN"),
          h("button", { className: "link-btn link-btn-blue mono", onClick: function () { setShowAddFood(true); } }, h(Plus, { size: 13 }), "eigenes Produkt")
        ),
        h("div", { className: "add-row" },
          h("div", { className: "field-search" },
            h(Search, { size: 14, className: "ico" }),
            h("input", {
              className: "input input-search", value: search, placeholder: "Produkt suchen…",
              onChange: function (e) { setSearch(e.target.value); }
            })
          ),
          h("div", { className: "select-wrap" },
            h("select", {
              className: "select", value: selectedId,
              onChange: function (e) { setSelectedId(e.target.value); }
            },
              filteredFoods.length === 0 ? h("option", null, "Keine Treffer") : null,
              Object.keys(groupedFiltered).map(function (group) {
                return h("optgroup", { key: group, label: group },
                  groupedFiltered[group].map(function (f) { return h("option", { key: f.id, value: f.id }, f.name); })
                );
              })
            ),
            h(ChevronDown, { size: 14, className: "select-chevron" })
          ),
          h("div", { className: "grams-wrap" },
            h("input", {
              type: "number", className: "input input-grams mono", value: grams, placeholder: "100",
              onChange: function (e) { setGrams(e.target.value); }
            }),
            h("span", { className: "grams-unit mono" }, "g")
          ),
          h("button", { className: "btn-primary", onClick: handleAddEntry }, h(Plus, { size: 15 }), "hinzufügen")
        ),
        selectedFood ? h("div", { className: "selected-info mono" },
          h("span", null, selectedFood.name + " · pro 100g: " + selectedFood.kcal + " kcal · P" + selectedFood.protein + " · K" + selectedFood.carbs + " · F" + selectedFood.fat),
          selectedFood.group === "Eigene Produkte" ? h("button", { className: "delete-link", onClick: function () { handleDeleteCustomFood(selectedFood.id); } }, h(Trash2, { size: 12 }), "löschen") : null
        ) : null,
        error ? h("div", { className: "error-text" }, error) : null
      ),

      h("div", { className: "card", style: { marginBottom: 0 } },
        h("div", { className: "section-label mono", style: { marginBottom: 12 } }, logHeaderLabel),
        log.length === 0
          ? h("div", { className: "log-empty" }, "Noch nichts erfasst — füge oben den ersten Eintrag für diesen Tag hinzu.")
          : h("div", null, log.map(function (e) {
              return h("div", { className: "log-item", key: e.id },
                h("div", { className: "log-name-wrap" },
                  h("div", { className: "log-name" }, e.name),
                  h("div", { className: "log-grams mono" }, e.grams + " g")
                ),
                h("div", { className: "log-meta mono" },
                  h("span", { className: "log-kcal" }, e.kcal + " kcal"),
                  h("span", { className: "log-macros" }, "P" + e.protein + " K" + e.carbs + " F" + e.fat),
                  h("button", { className: "log-del", onClick: function () { handleRemoveEntry(e.id); } }, h(Trash2, { size: 14 }))
                )
              );
            }))
      ),

      h("div", { className: "card", style: { marginTop: 24, marginBottom: 0 } },
        h("div", { className: "card-row" },
          h("span", { className: "section-label mono" }, "WOCHENÜBERSICHT"),
          h("span", { className: "mono muted", style: { fontSize: 12 } }, (function () {
            var active = weekData.filter(function (d) { return d.totals.kcal > 0; });
            if (active.length === 0) return "noch keine Daten";
            var avgKcal = active.reduce(function (s, d) { return s + d.totals.kcal; }, 0) / active.length;
            return "Ø " + Math.round(avgKcal) + " kcal/Tag";
          })())
        ),
        h("div", { className: "week-bars" },
          weekData.map(function (day) {
            var pct = goal.kcal > 0 ? Math.min(day.totals.kcal / goal.kcal, 1.2) : 0;
            var over = day.totals.kcal > goal.kcal;
            var isToday = day.key === todayStr;
            var isViewDate = day.key === viewDate;
            var labelColor = isViewDate ? "#8FBC5A" : (isToday ? "#EDE8DE" : "#8A8579");
            var labelBg = isViewDate ? "rgba(143,188,90,0.15)" : "transparent";
            return h("div", { className: "week-col", key: day.key, onClick: function () { jumpToDay(day.key); }, title: "Zu diesem Tag springen" },
              h("span", { className: "week-val mono" }, day.totals.kcal > 0 ? Math.round(day.totals.kcal) : ""),
              h("div", { className: "week-bar", style: {
                height: Math.max(pct * 100, day.totals.kcal > 0 ? 3 : 0) + "%",
                background: over ? "#C97B63" : "#8FBC5A",
                opacity: day.totals.kcal > 0 ? 1 : 0.15
              } }),
              h("span", { className: "week-label mono", style: { color: labelColor, fontWeight: (isViewDate || isToday) ? 600 : 400, background: labelBg } }, day.label)
            );
          })
        ),
        h("div", { className: "legend" },
          h("span", { className: "legend-item" }, h("span", { className: "legend-dot", style: { background: "#8FBC5A" } }), "im Ziel"),
          h("span", { className: "legend-item" }, h("span", { className: "legend-dot", style: { background: "#C97B63" } }), "über Tagesziel")
        )
      ),

      h("div", { className: "card", style: { marginTop: 24, marginBottom: 0 } },
        h("div", { className: "card-row" },
          h("div", { className: "section-label mono" }, h(Scale, { size: 14 }), "GEWICHT"),
          weightTrend !== null ? h("span", { className: "weight-trend mono " + (weightTrend > 0 ? "up" : (weightTrend < 0 ? "down" : "flat")) },
            (weightTrend > 0 ? "+" : "") + weightTrend + " kg · 7 Tage"
          ) : null
        ),

        h("div", { className: "weight-current-row" },
          h("span", { className: "weight-current-val display" }, latestWeight ? latestWeight.weight : "–"),
          h("span", { className: "weight-current-unit mono" }, "kg"),
          latestWeight ? h("span", { className: "mono muted", style: { fontSize: 11 } }, "zuletzt " + formatShortDate(latestWeight.date)) : null
        ),

        h("div", { className: "weight-log-row" },
          h("div", null,
            h("div", { className: "weight-log-label" }, viewDate === todayStr ? "GEWICHT HEUTE" : ("GEWICHT AM " + formatShortDate(viewDate))),
            h("input", {
              type: "number", step: "0.1", min: "0", className: "input weight-input mono", placeholder: "z. B. 78.4",
              value: weightInput, onChange: function (e) { setWeightInput(e.target.value); }
            })
          ),
          h("button", { className: "btn-primary", style: { marginTop: 20 }, onClick: handleSaveWeight }, h(Check, { size: 15 }), "speichern")
        ),
        weightError ? h("div", { className: "error-text", style: { marginTop: -12, marginBottom: 12 } }, weightError) : null,

        h("div", { className: "range-toggle" },
          RANGE_OPTIONS.map(function (r) {
            return h("button", {
              key: r.key,
              className: "range-btn" + (weightRange === r.key ? " active" : ""),
              onClick: function () { setWeightRange(r.key); }
            }, r.label);
          })
        ),

        h(LineChart, { points: chartPoints, color: "#5B8FA3" }),

        chartPoints.length ? h("div", { className: "weight-range-stats" },
          h("span", null, "Min " + rangeMin + " kg"),
          h("span", null, "Max " + rangeMax + " kg")
        ) : null
      )
    ),

    showAddFood ? h("div", { className: "modal-overlay" },
      h("div", { className: "modal" },
        h("div", { className: "modal-header" },
          h("span", { className: "modal-title display" }, "Eigenes Produkt"),
          h("button", { className: "modal-close", onClick: function () { setShowAddFood(false); } }, h(X, { size: 18 }))
        ),
        h("div", { className: "field-col" },
          h("input", {
            className: "input", placeholder: "Name", value: newFood.name,
            onChange: function (e) { setNewFood(Object.assign({}, newFood, { name: e.target.value })); }
          }),
          h("div", { className: "field-hint mono" }, "Werte pro 100 g"),
          h("div", { className: "field-grid2" },
            ["kcal", "protein", "carbs", "fat"].map(function (k) {
              return h("div", { className: "field-rel", key: k },
                h("input", {
                  type: "number", className: "input mono", placeholder: MACRO_META[k].label, value: newFood[k],
                  onChange: function (e) { var nf = Object.assign({}, newFood); nf[k] = e.target.value; setNewFood(nf); }
                }),
                h("span", { className: "field-unit" }, MACRO_META[k].unit)
              );
            })
          ),
          error ? h("div", { className: "error-text" }, error) : null,
          h("button", { className: "btn-primary", style: { width: "100%", marginTop: 4 }, onClick: handleSaveCustomFood }, h(Check, { size: 15 }), "speichern")
        )
      )
    ) : null,

    showGoalEdit ? h("div", { className: "modal-overlay" },
      h("div", { className: "modal" },
        h("div", { className: "modal-header" },
          h("span", { className: "modal-title display" }, "Tagesziel anpassen"),
          h("button", { className: "modal-close", onClick: function () { setShowGoalEdit(false); } }, h(X, { size: 18 }))
        ),
        h("div", { className: "field-grid2" },
          ["kcal", "protein", "carbs", "fat"].map(function (k) {
            return h("div", { className: "field-rel", key: k },
              h("label", { className: "field-label mono" }, MACRO_META[k].label),
              h("input", {
                type: "number", className: "input mono", value: goalDraft[k],
                onChange: function (e) { var gd = Object.assign({}, goalDraft); gd[k] = e.target.value; setGoalDraft(gd); }
              }),
              h("span", { className: "field-unit field-unit-goal" }, MACRO_META[k].unit)
            );
          })
        ),
        h("button", { className: "btn-primary", style: { width: "100%", marginTop: 16 }, onClick: handleSaveGoal }, h(Check, { size: 15 }), "Ziel speichern")
      )
    ) : null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(NutritionTracker));
</script>
